jacocoTestCoverageVerification {
    violationRules {
        rule {
            element = 'METHOD'
            includes = ['se.svt.oss.encore.*']
            excludes = [
                    '*.invoke()',
                    '*.log$lambda$0()',
                    '*.EncoreProperties*.get*()',
                    '*.DefaultConstructorMarker*',
                    '*ApplicationKt.main*',
                    '*.static {...}',
                    '*.DefaultImpls.*',
                    '*.model.*.get*',
                    '*.service.localencode.LocalEncodeService.moveFile*',
                    '*.OpenAPIConfiguration.*',
                    '*.JsonRedisCodec.getJsonMapper()',
                    '*.ShutdownHandler.*',
                    '*.ApplicationShutdownException.*',
                    '*FfmpegExecutor.runFfmpeg$lambda$*',
                    '*.EncoreJobLinkRelationProvider.*',
                    '*FfmpegExecutor.parseVmafMetrics$lambda$*',
                    '*.CommandBuilder.loopbackParams$lambda$*',
                    '*RedisService.createIndex$lambda$*',
                    '*QueueService.repostJob*',
                    '*QueueService.handleOrphanedQueues$lambda$*',
                    '*EncoreService.handleProgress*emit$lambda$*',
                    '*EncoreService.encodeSegmented$lambda$*',
                    '*EncoreService.encodeSegment$lambda$*'
            ]
            limit {
                counter = 'LINE'
                minimum = 0.7
            }
        }

        failOnViolation = true
    }
}

jacocoTestCoverageVerification.dependsOn jacocoTestReport
check.dependsOn jacocoTestCoverageVerification
