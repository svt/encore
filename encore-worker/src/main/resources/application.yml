spring:
  application:
    name: encore
  banner:
    location: classpath:asciilogo.txt
  main:
    web-application-type: none
  cloud:
    config:
      import-check:
        enabled: false
  threads:
    virtual:
      enabled: true

encore-settings:
  redis:
    prefix: ${spring.application.name}

logging:
  config: classpath:logback-json.xml
