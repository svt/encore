spring:
  application:
    name: encore
  banner:
    location: classpath:asciilogo.txt
  cloud:
    config:
      import-check:
        enabled: false
  mvc:
    problemdetails:
      enabled: true
  threads:
    virtual:
      enabled: true
encore-settings:
  redis:
    prefix: ${spring.application.name}
logging:
  config: classpath:logback-json.xml

management:
  endpoint:
    health:
      show-details: when_authorized
      roles: ADMIN
      probes:
        enabled: true

springdoc:
  paths-to-exclude: /profile/encoreJobs,/profile
  swagger-ui:
    operations-sorter: alpha
    tags-sorter: alpha
    disable-swagger-default-url: true
server:
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/vnd.hal+json, application/json, application/problem+json
